name: CI — Lint, Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  JWT_SECRET: ci-test-secret-not-for-production-32chars
  JWT_EXPIRES_IN: 1h
  COOKIE_SECRET: ci-cookie-secret-not-for-production-32chars
  MONGO_URI: mongodb://localhost:27017/techstore-test
  CLIENT_URL: http://localhost:5173
  PORT: 3000
  # Email config — empty in CI (graceful degradation; emails are skipped in test)
  EMAIL_HOST: ""
  EMAIL_PORT: "587"
  EMAIL_USER: ""
  EMAIL_PASS: ""
  EMAIL_FROM: "CI Test <noreply@test.local>"
  ADMIN_EMAIL: ""

jobs:
  secrets-scan:
    name: Secrets scan — detect hardcoded credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets in tracked files..."
          PATTERNS='(sk-[a-zA-Z0-9_-]{20,}|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36}|smtp://[^@]+@|password\s*[:=]\s*["\x27][^"\x27]{8,})'
          EXCLUDES='--exclude=*.lock --exclude-dir=node_modules --exclude-dir=.git --exclude=ci.yml'
          if git diff --name-only origin/main...HEAD 2>/dev/null | xargs grep -nEi "$PATTERNS" $EXCLUDES 2>/dev/null; then
            echo "::error::Potential secrets detected in changed files. Review the matches above."
            exit 1
          fi
          echo "No hardcoded secrets detected in changed files."

  env-check:
    name: Env config — validate .env.example completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check .env.example documents all required vars
        run: |
          echo "Checking server/.env.example for required environment variables..."
          REQUIRED_VARS="PORT MONGO_URI CLIENT_URL JWT_SECRET JWT_EXPIRES_IN COOKIE_SECRET NODE_ENV"
          MISSING=""
          for var in $REQUIRED_VARS; do
            if ! grep -q "^${var}=" server/.env.example 2>/dev/null; then
              MISSING="$MISSING $var"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing from server/.env.example:$MISSING"
          fi
          # Email vars — warn-only until email feature is merged
          EMAIL_VARS="EMAIL_HOST EMAIL_PORT EMAIL_USER EMAIL_PASS EMAIL_FROM ADMIN_EMAIL"
          MISSING_EMAIL=""
          for var in $EMAIL_VARS; do
            if ! grep -q "^${var}=" server/.env.example 2>/dev/null; then
              MISSING_EMAIL="$MISSING_EMAIL $var"
            fi
          done
          if [ -n "$MISSING_EMAIL" ]; then
            echo "::warning::Email vars not yet in server/.env.example (pending email feature):$MISSING_EMAIL"
          fi
          echo "Env config check complete."

  server:
    name: Server — lint & test
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm run lint --if-present
        working-directory: server
      - run: npm test -- --run
        working-directory: server

  client:
    name: Client — lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm run lint --if-present
        working-directory: client
      - run: npm test -- --run
        working-directory: client
      - run: npm run build
        working-directory: client

  health-check:
    name: Server health endpoint smoke test
    needs: [server]
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - name: Start server and check /health
        working-directory: server
        run: |
          npx tsx src/server.ts &
          SERVER_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/health; then
              echo " Health check passed"
              kill $SERVER_PID
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 30s"
          kill $SERVER_PID 2>/dev/null
          exit 1
